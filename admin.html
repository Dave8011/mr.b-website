<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. B - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050508;
            --bg-navy: #0a0b16;
            --surface: rgba(18, 20, 36, 0.6);
            --gold: #c9a02a;
            --gold-light: #e0b842;
            --text-light: #f5f5f7;
            --text-muted: #9ba0ab;
            --danger: #ff4c4c;
            --border: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, var(--bg-navy), var(--bg-dark) 80%); 
            color: var(--text-light); 
            margin: 0; 
            padding: 3rem 1rem; 
            min-height: 100vh;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        h1, h2, h3 { font-family: 'Cinzel', serif; color: #fff; font-weight: 700; margin-top: 0; }
        .gold-text { color: var(--gold); }
        
        .card { 
            background: var(--surface); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border); 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            margin-bottom: 2.5rem; 
        }
        
        .input-group { margin-bottom: 1.5rem; flex: 1; min-width: 250px; }
        .input-group label { 
            display: block; 
            margin-bottom: 0.6rem; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        input, select { 
            width: 100%; 
            padding: 1rem 1.2rem; 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid var(--border); 
            color: #fff; 
            border-radius: 8px; 
            font-family: 'Inter', sans-serif; 
            transition: all 0.3s ease; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        
        input:focus { 
            outline: none; 
            border-color: var(--gold); 
            box-shadow: 0 0 15px rgba(201,160,42,0.15); 
            background: rgba(0,0,0,0.5); 
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--gold), var(--gold-light)); 
            color: #000; 
            border: none; 
            padding: 1rem 2rem; 
            font-weight: 700; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            font-family: 'Inter', sans-serif; 
            letter-spacing: 1px;
            font-size: 1rem;
        }
        
        .btn-primary:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 20px rgba(201,160,42,0.3); 
        }
        
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-secondary { 
            background: rgba(255,255,255,0.05); 
            color: #fff; 
            border: 1px solid var(--border); 
            padding: 0.8rem 1.2rem; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        
        .btn-danger { 
            background: rgba(255, 76, 76, 0.1); 
            color: var(--danger); 
            border: 1px solid rgba(255, 76, 76, 0.3); 
        }
        
        .btn-danger:hover { background: rgba(255, 76, 76, 0.2); }
        
        .event-list { display: grid; gap: 1.2rem; }
        
        .event-card { 
            background: rgba(0,0,0,0.2); 
            border: 1px solid var(--border); 
            padding: 1.5rem; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.3s; 
        }
        
        .event-card:hover { 
            border-color: rgba(255,255,255,0.15); 
            background: rgba(0,0,0,0.4); 
            transform: translateX(5px);
        }
        
        .event-details h3 { margin: 0 0 0.5rem 0; font-size: 1.3rem; letter-spacing: 0.5px; }
        .event-details p { margin: 0; font-size: 0.95rem; color: var(--text-muted); }
        
        .status-badge { 
            padding: 0.3rem 0.8rem; 
            border-radius: 20px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            margin-left: 1rem; 
            vertical-align: middle; 
            letter-spacing: 1px;
        }
        
        .status-active { 
            background: rgba(46, 164, 79, 0.15); 
            color: #4ade80; 
            border: 1px solid rgba(46, 164, 79, 0.3); 
        }
        
        .status-hidden { 
            background: rgba(255, 76, 76, 0.1); 
            color: var(--danger); 
            border: 1px solid rgba(255, 76, 76, 0.3); 
        }
        
        .hidden { display: none !important; }
        
        #toast { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background: linear-gradient(135deg, var(--gold), var(--gold-light)); 
            color: #000; 
            padding: 1.2rem 2.5rem; 
            border-radius: 8px; 
            font-weight: 700; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            transform: translateY(100px); 
            opacity: 0; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1000; 
        }
        
        #toast.show { transform: translateY(0); opacity: 1; }
        
        @media (max-width: 600px) {
            .event-card { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .event-actions { width: 100%; display: flex; justify-content: flex-end; }
        }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
        <h1 style="font-size: 2rem; margin: 0;">Mr. B <span class="gold-text">Admin Panel</span></h1>
        <div style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600; letter-spacing: 1px;"><i class="fa-solid fa-shield-halved gold-text"></i> SECURE ACCESS</div>
    </div>

    <!-- Login Form -->
    <div class="card" id="login-section" style="max-width: 450px; margin: 4rem auto; text-align: center;">
        <i class="fa-solid fa-user-lock gold-text" style="font-size: 3.5rem; margin-bottom: 1.5rem;"></i>
        <h2 style="margin-bottom: 2.5rem; font-size: 1.5rem;">Authentication Required</h2>
        
        <div class="input-group" style="text-align: left;">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>
        <div class="input-group" style="text-align: left;">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        
        <button class="btn-primary" onclick="login()" style="width: 100%; margin-top: 1rem;">
            <i class="fa-solid fa-right-to-bracket" style="margin-right: 0.5rem;"></i> Secure Login
        </button>
        
        <p id="login-error" style="color: var(--danger); text-align: center; margin-top: 1.5rem; font-size: 0.9rem; font-weight: 500;" class="hidden">
            <i class="fa-solid fa-triangle-exclamation"></i> Invalid credentials.
        </p>
    </div>

    <!-- Events Manager -->
    <div id="app-section" class="hidden">
        
        <!-- Add Event Card -->
        <div class="card">
            <h2 style="margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
                <i class="fa-solid fa-calendar-plus gold-text" style="margin-right: 0.5rem;"></i> Create New Event
            </h2>
            
            <div style="display:flex; gap:1.5rem; flex-wrap: wrap;">
                <div class="input-group">
                    <label>Event Title</label>
                    <input type="text" id="ev-title" placeholder="e.g. Corporate Illusions">
                </div>
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" id="ev-date">
                </div>
            </div>
            
            <div style="display:flex; gap:1.5rem; flex-wrap: wrap;">
                <div class="input-group">
                    <label>Time</label>
                    <input type="text" id="ev-time" placeholder="e.g. 7:00 PM">
                </div>
                <div class="input-group">
                    <label>Location</label>
                    <input type="text" id="ev-location" placeholder="e.g. Taj West End, Bangalore">
                </div>
            </div>
            
            <div class="input-group">
                <label>Featured Image URL</label>
                <input type="text" id="ev-image" placeholder="default: images/event1.jpg" value="images/event1.jpg">
            </div>
            
            <div style="text-align: right; margin-top: 1rem;">
                <button class="btn-primary" onclick="addEvent()">
                    <i class="fa-solid fa-plus" style="margin-right: 0.5rem;"></i> Add Event to Roster
                </button>
            </div>
        </div>

        <!-- Manage Events Card -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
                <h2 style="margin: 0;">
                    <i class="fa-solid fa-list-check gold-text" style="margin-right: 0.5rem;"></i> Manage Events
                </h2>
                <button class="btn-primary" onclick="publishEvents()" style="background: linear-gradient(135deg, #2ea44f, #22863a); color: white;">
                    <i class="fa-solid fa-cloud-arrow-up" style="margin-right: 0.5rem;"></i> Publish to Website
                </button>
            </div>
            
            <div class="event-list" id="event-list">
                <!-- Event cards injected here -->
            </div>
        </div>
    </div>
</div>

<div id="toast"><i class="fa-solid fa-circle-check"></i> Saved!</div>

<script>
    let eventsData = [];
    let fileSha = '';

    window.onload = () => {
        const token = localStorage.getItem('admin_token');
        if (token) {
            loadEvents(token);
        }
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerHTML = `<i class="fa-solid fa-circle-check" style="margin-right:0.5rem;"></i> ${msg}`;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3500);
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const btn = document.querySelector('#login-section button');
        const err = document.getElementById('login-error');
        
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
        err.classList.add('hidden');

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            
            if (res.ok && data.token) {
                localStorage.setItem('admin_token', data.token);
                loadEvents(data.token);
            } else {
                err.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${data.error || "Login failed"}`;
                err.classList.remove('hidden');
            }
        } catch (e) {
            err.innerHTML = `<i class="fa-solid fa-wifi"></i> Network error. Please try again.`;
            err.classList.remove('hidden');
        } finally {
            if(!res?.ok) btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Secure Login';
        }
    }

    async function loadEvents(token) {
        const loginSec = document.getElementById('login-section');
        const appSec = document.getElementById('app-section');
        
        try {
            const res = await fetch('/api/getEvents', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) {
                // Token invalid or expired
                localStorage.removeItem('admin_token');
                loginSec.classList.remove('hidden');
                appSec.classList.add('hidden');
                document.querySelector('#login-section button').innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Secure Login';
                return;
            }

            const data = await res.json();
            if (!res.ok) throw new Error(data.error);

            fileSha = data.sha;
            eventsData = data.events;
            
            loginSec.classList.add('hidden');
            appSec.classList.remove('hidden');
            renderEvents();
        } catch (e) {
            alert("Error loading events: " + e.message);
        }
    }

    function renderEvents() {
        const container = document.getElementById('event-list');
        container.innerHTML = '';
        
        if(eventsData.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:var(--text-muted); font-style:italic; padding: 2rem;">No events found. Add one above to get started!</p>';
            return;
        }
        
        eventsData.forEach((ev, index) => {
            const status = ev.is_hidden ? '<span class="status-badge status-hidden">HIDDEN</span>' : '<span class="status-badge status-active">ACTIVE</span>';
            const html = `
                <div class="event-card">
                    <div class="event-details">
                        <h3>${ev.title} ${status}</h3>
                        <p><i class="fa-regular fa-calendar" style="margin-right:0.3rem;"></i> ${ev.date} &nbsp;|&nbsp; <i class="fa-regular fa-clock" style="margin-right:0.3rem;"></i> ${ev.time} &nbsp;|&nbsp; <i class="fa-solid fa-location-dot" style="margin-right:0.3rem;"></i> ${ev.location}</p>
                    </div>
                    <div class="event-actions">
                        <button class="btn-secondary" onclick="toggleEvent(${index})" title="Toggle Visibility" style="margin-right: 0.5rem;">
                            <i class="fa-solid ${ev.is_hidden ? 'fa-eye' : 'fa-eye-slash'}"></i>
                        </button>
                        <button class="btn-secondary btn-danger" onclick="deleteEvent(${index})" title="Delete Event">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });
    }

    function addEvent() {
        const title = document.getElementById('ev-title').value;
        const date = document.getElementById('ev-date').value;
        const time = document.getElementById('ev-time').value || "7:00 PM";
        const location = document.getElementById('ev-location').value;
        const image = document.getElementById('ev-image').value || "images/event1.jpg";

        if (!title || !date) {
            alert("Please provide at least a Title and a Date.");
            return;
        }

        eventsData.unshift({
            id: 'event-' + Date.now(),
            title, date, time, location,
            image_url: image,
            link: "/contact",
            is_hidden: false
        });

        document.getElementById('ev-title').value = '';
        document.getElementById('ev-date').value = '';
        document.getElementById('ev-time').value = '';
        document.getElementById('ev-location').value = '';

        renderEvents();
    }

    function toggleEvent(idx) {
        eventsData[idx].is_hidden = !eventsData[idx].is_hidden;
        renderEvents();
    }

    function deleteEvent(idx) {
        if(confirm("Are you sure you want to permanently delete this event?")) {
            eventsData.splice(idx, 1);
            renderEvents();
        }
    }

    async function publishEvents() {
        const token = localStorage.getItem('admin_token');
        const btn = document.querySelector('button[onclick="publishEvents()"]');
        const origText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Publishing...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/saveEvents', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ eventsData, sha: fileSha })
            });
            
            const data = await res.json();
            
            if (res.status === 401) {
                alert("Session expired. Please reload and login again.");
                return;
            }
            if (!res.ok) throw new Error(data.error);

            fileSha = data.newSha; // update SHA for future edits
            showToast("Successfully Published! Website is updating.");
        } catch (e) {
            alert(e.message);
        } finally {
            btn.innerHTML = origText;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
